<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>TaskFlow</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<div class="top">

<h1>TaskFlow</h1>

<p>
Professional Project Management Dashboard
</p>

</div>

<div class="controls">

<input
id="task"
placeholder="Create a new task">

<select id="priority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<button
onclick="addTask()">

+ Add Task

</button>

</div>

<div id="stats">

<div class="box">

<h2 id="total">
0
</h2>

<span>
Total
</span>

</div>

<div class="box">

<h2 id="done">
0
</h2>

<span>
Completed
</span>

</div>

<div class="box">

<h2 id="pending">
0
</h2>

<span>
Pending
</span>

</div>

</div>

<div id="list">

</div>

</div>

<script src="script.js"></script>

</body>

</html>
